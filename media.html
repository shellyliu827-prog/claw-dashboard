<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 书影记录</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f5f3ef;
    --card: #ffffff;
    --border: #e8e4de;
    --border-light: #f0ece6;
    --text: #1a1a1a;
    --text-sub: #666;
    --text-muted: #aaa;
    --movie: #e87a5a;
    --tv: #5a9fd4;
    --book: #4a9e4a;
    --music: #c97af4;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    padding: 40px 28px 56px;
    font-family: 'Inter', 'Noto Sans SC', sans-serif;
    color: var(--text);
  }

  .container { max-width: 1080px; margin: 0 auto; }

  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 36px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .page-title { font-size: 56px; font-weight: 700; line-height: 1; letter-spacing: -2px; }
  .page-title span { color: var(--movie); }
  .page-sub { font-size: 13px; font-weight: 300; color: var(--text-muted); letter-spacing: 4px; margin-top: 6px; text-transform: uppercase; }
  .back-link { font-size: 12px; color: var(--text-muted); text-decoration: none; display: flex; align-items: center; gap: 4px; transition: color 0.15s; }
  .back-link:hover { color: var(--text); }
  .header-right { text-align: right; }
  .douban-link { font-size: 12px; color: var(--text-muted); text-decoration: none; }
  .douban-link:hover { color: var(--text); }

  /* ── Stats ── */
  .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 32px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
  .stat-num { font-size: 36px; font-weight: 700; line-height: 1; }
  .stat-num.movie { color: var(--movie); }
  .stat-num.tv { color: var(--tv); }
  .stat-num.book { color: var(--book); }
  .stat-num.music { color: var(--music); }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 6px; }

  /* ── Section ── */
  .section-title { font-size: 11px; font-weight: 600; letter-spacing: 3px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 14px; }
  .section { margin-bottom: 36px; }

  /* ── 类型筛选 tabs ── */
  .filter-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab-btn:hover { border-color: #ccc; color: var(--text); }
  .tab-btn.active { background: var(--text); color: #fff; border-color: var(--text); }
  .tab-btn.movie.active { background: var(--movie); border-color: var(--movie); }
  .tab-btn.tv.active { background: var(--tv); border-color: var(--tv); }
  .tab-btn.book.active { background: var(--book); border-color: var(--book); }

  /* ── Media Grid ── */
  .media-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  .media-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: box-shadow 0.15s, transform 0.15s;
    cursor: default;
  }
  .media-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); transform: translateY(-2px); }

  .media-poster {
    width: 100%;
    aspect-ratio: 2/3;
    background: #f0ece6;
    overflow: hidden;
    position: relative;
  }
  .media-poster img { width: 100%; height: 100%; object-fit: cover; }
  .media-poster.no-img {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
  }

  /* 类型角标 */
  .media-type-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    padding: 2px 7px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .badge-movie { background: rgba(232,122,90,0.9); color: #fff; }
  .badge-tv { background: rgba(90,159,212,0.9); color: #fff; }
  .badge-book { background: rgba(74,158,74,0.9); color: #fff; }
  .badge-music { background: rgba(201,122,244,0.9); color: #fff; }

  /* context 标签（北影节等） */
  .context-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    padding: 2px 7px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 500;
    background: rgba(0,0,0,0.55);
    color: #fff;
    backdrop-filter: blur(2px);
  }

  .media-info { padding: 12px; }
  .media-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; margin-bottom: 5px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .media-meta { display: flex; align-items: center; justify-content: space-between; }
  .media-date { font-size: 11px; color: var(--text-muted); }
  .media-rating { font-size: 12px; color: #e8a020; letter-spacing: -1px; }
  .media-note { font-size: 11px; color: var(--text-muted); margin-top: 5px; line-height: 1.4; font-style: italic; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

  /* 评分为0时的待标记样式 */
  .rating-pending { font-size: 10px; color: #bbb; }

  /* ── 月度统计折叠 ── */
  .month-group { margin-bottom: 32px; }
  .month-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .month-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .month-count { font-size: 12px; color: var(--text-muted); }

  /* ── 空状态 ── */
  .empty-state { text-align: center; padding: 48px; color: var(--text-muted); font-size: 14px; }

  @media (max-width: 600px) {
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .media-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  }
</style>
</head>
<body>
<script src="data.js"></script>
<div class="container">

  <!-- ── Header ── -->
  <div class="header">
    <div>
      <div class="page-title">书<span>影</span></div>
      <div class="page-sub">MEDIA LOG · 2026</div>
    </div>
    <div class="header-right">
      <a class="back-link" href="index.html">← 返回主页</a>
      <div style="margin-top:8px;">
        <a class="douban-link" href="https://www.douban.com/people/180472102/" target="_blank">豆瓣 @2000kg →</a>
      </div>
    </div>
  </div>

  <!-- ── Stats ── -->
  <div class="stats-bar" id="statsBar"></div>

  <!-- ── 筛选 tabs ── -->
  <div class="filter-tabs">
    <button class="tab-btn active" data-type="all" onclick="filterMedia('all',this)">全部</button>
    <button class="tab-btn movie" data-type="movie" onclick="filterMedia('movie',this)">🎬 电影</button>
    <button class="tab-btn tv" data-type="tv" onclick="filterMedia('tv',this)">📺 剧集</button>
    <button class="tab-btn book" data-type="book" onclick="filterMedia('book',this)">📚 图书</button>
  </div>
  <!-- ── Media List（按月分组）── -->
  <div id="mediaList"></div>

</div>

<script>
var currentFilter = 'all';

// ── 评分转星星 ──
function stars(r) {
  if (!r || r === 0) return '<span class="rating-pending">待标记</span>';
  var full = '★'.repeat(r);
  var empty = '☆'.repeat(5 - r);
  return '<span class="media-rating">' + full + empty + '</span>';
}

// ── 类型 badge ──
function typeBadge(t) {
  var map = { movie: ['badge-movie', '电影'], tv: ['badge-tv', '剧集'], book: ['badge-book', '图书'], music: ['badge-music', '音乐'] };
  var info = map[t] || ['badge-movie', t];
  return '<span class="media-type-badge ' + info[0] + '">' + info[1] + '</span>';
}

// ── 默认封面 emoji ──
function defaultEmoji(t) {
  return { movie: '🎬', tv: '📺', book: '📚', music: '🎵' }[t] || '🎬';
}

// ── 格式化月份 ──
function fmtMonth(m) {
  var names = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  return names[m - 1] || m + '月';
}

// ── 渲染单张卡片 ──
function renderCard(item) {
  var posterHtml;
  if (item.poster) {
    posterHtml = '<img src="' + item.poster + '" alt="' + item.title + '" loading="lazy">';
  } else {
    posterHtml = '<div style="font-size:40px;display:flex;align-items:center;justify-content:center;width:100%;height:100%;">' + defaultEmoji(item.type) + '</div>';
  }

  var contextBadge = item.context
    ? '<span class="context-badge">' + item.context + '</span>'
    : '';

  var dateShort = item.date ? item.date.slice(5).replace('-', '/') : '';

  var noteHtml = item.note
    ? '<div class="media-note">' + item.note + '</div>'
    : '';

  var titleLink = item.douban_url
    ? '<a href="' + item.douban_url + '" target="_blank" style="color:inherit;text-decoration:none;">' + item.title + '</a>'
    : item.title;

  return '<div class="media-card" data-type="' + item.type + '">'
    + '<div class="media-poster' + (item.poster ? '' : ' no-img') + '">'
    + posterHtml
    + typeBadge(item.type)
    + contextBadge
    + '</div>'
    + '<div class="media-info">'
    + '<div class="media-title">' + titleLink + '</div>'
    + '<div class="media-meta">'
    + '<span class="media-date">' + dateShort + '</span>'
    + stars(item.rating)
    + '</div>'
    + noteHtml
    + '</div>'
    + '</div>';
}

// ── 主渲染 ──
function renderAll(filter) {
  var data = typeof MEDIA_LOG !== 'undefined' ? MEDIA_LOG : [];

  // 统计
  var counts = { movie: 0, tv: 0, book: 0, music: 0 };
  data.forEach(function(d) { if (counts[d.type] !== undefined) counts[d.type]++; });

  document.getElementById('statsBar').innerHTML =
    '<div class="stat-card"><div class="stat-num movie">' + counts.movie + '</div><div class="stat-label">🎬 电影 · 今年</div>'
    + (typeof DOUBAN_STATS !== 'undefined' ? '<div style="font-size:11px;color:#ccc;margin-top:4px;">豆瓣累计 ' + DOUBAN_STATS.movie + '</div>' : '')
    + '</div>'
    + '<div class="stat-card"><div class="stat-num tv">' + counts.tv + '</div><div class="stat-label">📺 剧集 · 今年</div></div>'
    + '<div class="stat-card"><div class="stat-num book">' + counts.book + '</div><div class="stat-label">📚 图书 · 今年</div>'
    + (typeof DOUBAN_STATS !== 'undefined' ? '<div style="font-size:11px;color:#ccc;margin-top:4px;">豆瓣累计 ' + DOUBAN_STATS.book + '</div>' : '')
    + '</div>';

  // 过滤
  var filtered = filter === 'all' ? data : data.filter(function(d) { return d.type === filter; });

  if (filtered.length === 0) {
    document.getElementById('mediaList').innerHTML = '<div class="empty-state">暂无记录</div>';
    return;
  }

  // 按月分组
  var groups = {};
  var groupOrder = [];
  filtered.forEach(function(item) {
    var key = item.date ? item.date.slice(0, 7) : '未知';
    if (!groups[key]) { groups[key] = []; groupOrder.push(key); }
    groups[key].push(item);
  });
  groupOrder.sort(function(a, b) { return b.localeCompare(a); }); // 最新在前

  var html = '';
  groupOrder.forEach(function(monthKey) {
    var items = groups[monthKey];
    var m = parseInt(monthKey.split('-')[1]);
    var y = monthKey.split('-')[0];
    html += '<div class="month-group">'
      + '<div class="month-header">'
      + '<span class="month-name">' + y + ' · ' + fmtMonth(m) + '</span>'
      + '<span class="month-count">' + items.length + ' 条</span>'
      + '</div>'
      + '<div class="media-grid">';
    items.forEach(function(item) {
      html += renderCard(item);
    });
    html += '</div></div>';
  });

  document.getElementById('mediaList').innerHTML = html;
}

function filterMedia(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderAll(type);
}

// 初始渲染
renderAll('all');
</script>
</body>
</html>
