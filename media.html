<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 书影记录</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f5f3ef;
    --card: #ffffff;
    --border: #e8e4de;
    --text: #1a1a1a;
    --text-sub: #666;
    --text-muted: #aaa;
    --movie: #e87a5a;
    --tv: #5a9fd4;
    --book: #4a9e4a;
    --music: #c97af4;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    padding: 40px 28px 56px;
    font-family: 'Inter', 'Noto Sans SC', sans-serif;
    color: var(--text);
  }

  .container { max-width: 720px; margin: 0 auto; }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .page-title { font-size: 48px; font-weight: 700; line-height: 1; letter-spacing: -2px; }
  .page-title span { color: var(--movie); }
  .page-sub { font-size: 13px; font-weight: 300; color: var(--text-muted); letter-spacing: 4px; margin-top: 6px; text-transform: uppercase; }
  .back-link { font-size: 12px; color: var(--text-muted); text-decoration: none; display: flex; align-items: center; gap: 4px; transition: color 0.15s; }
  .back-link:hover { color: var(--text); }
  .header-right { text-align: right; }
  .douban-link { font-size: 12px; color: var(--text-muted); text-decoration: none; }
  .douban-link:hover { color: var(--text); }

  /* ── Stats（影/书 两栏）── */
  .stats-bar {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
  }
  .stat-num { font-size: 32px; font-weight: 700; line-height: 1; }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .stat-sub { font-size: 11px; color: #ccc; margin-top: 4px; }

  /* ── 筛选 tabs ── */
  .filter-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab-btn:hover { border-color: #ccc; color: var(--text); }
  .tab-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

  /* ── 月度分组 ── */
  .month-group { margin-bottom: 28px; }
  .month-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border-light);
  }
  .month-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .month-count { font-size: 11px; color: var(--text-muted); }

  /* ── 紧凑文字卡片列表 ── */
  .media-list { display: flex; flex-direction: column; gap: 0; }
  .media-item {
    background: var(--card);
    border: 1px solid var(--border-light);
    border-radius: 8px;
    padding: 10px 14px;
    transition: background 0.12s;
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    gap: 10px;
    align-items: center;
  }
  .media-item:hover { background: #fafaf8; }

  /* 类型图标 */
  .item-type-icon {
    font-size: 15px;
    width: 26px;
    height: 26px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .icon-movie { background: rgba(232,122,90,0.12); }
  .icon-tv { background: rgba(90,159,212,0.12); }
  .icon-book { background: rgba(74,158,74,0.12); }
  .icon-music { background: rgba(201,122,244,0.12); }

  /* 标题区 */
  .item-body { min-width: 0; }
  .item-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.35;
  }
  .item-title a { color: inherit; text-decoration: none; }
  .item-title a:hover { color: var(--movie); }
  /* 短评/补充信息 — 正常小字，不斜体 */
  .item-note {
    font-size: 12px;
    color: var(--text-sub);
    line-height: 1.4;
    margin-top: 2px;
  }
  /* context 标签 */
  .ctx-tag {
    display: inline-block;
    font-size: 10px;
    padding: 0 6px;
    border-radius: 4px;
    background: rgba(0,0,0,0.06);
    color: var(--text-muted);
    margin-right: 6px;
    font-style: normal;
    vertical-align: middle;
  }

  /* 评分 + 日期 */
  .item-rating {
    font-size: 13px;
    color: #e8a020;
    letter-spacing: -1px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .rating-pending { font-size: 11px; color: #ccc; letter-spacing: 0; }
  .item-date {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── 空状态 ── */
  .empty-state { text-align: center; padding: 48px; color: var(--text-muted); font-size: 14px; }

  @media (max-width: 600px) {
    body { padding: 24px 16px 40px; }
    .page-title { font-size: 36px; }
    .media-item {
      grid-template-columns: auto 1fr;
      gap: 6px 10px;
      padding: 10px 12px;
    }
    .item-rating { grid-column: 2; justify-self: start; }
    .item-date { grid-column: 2; justify-self: start; }
  }
</style>
</head>
<body>
<script src="data.js"></script>
<div class="container">

  <!-- ── Header ── -->
  <div class="header">
    <div>
      <div class="page-title">书<span>影</span></div>
      <div class="page-sub">Media Log · 2026</div>
    </div>
    <div class="header-right">
      <a class="back-link" href="index.html">← 返回主页</a>
      <div style="margin-top:8px;">
        <a class="douban-link" href="https://www.douban.com/people/180472102/" target="_blank">豆瓣 @2000kg →</a>
      </div>
    </div>
  </div>

  <!-- ── Stats ── -->
  <div class="stats-bar" id="statsBar"></div>

  <!-- ── 筛选 tabs ── -->
  <div class="filter-tabs">
    <button class="tab-btn active" data-type="all" onclick="filterMedia('all',this)">全部</button>
    <button class="tab-btn" data-type="video" onclick="filterMedia('video',this)">🎬 影</button>
    <button class="tab-btn" data-type="book" onclick="filterMedia('book',this)">📚 书</button>
    <button class="tab-btn" data-type="festival" onclick="filterMedia('festival',this)">🎪 电影节</button>
  </div>

  <!-- ── Media List ── -->
  <div id="mediaList"></div>

</div>

<script>
var currentFilter = 'all';

// ── 评分星星 ──
function stars(r) {
  if (!r || r === 0) return '<span class="rating-pending">待评</span>';
  var full = '★'.repeat(r);
  var empty = '☆'.repeat(5 - r);
  return '<span class="item-rating">' + full + empty + '</span>';
}

// ── 类型信息 ──
function typeInfo(t) {
  var map = {
    movie: { icon: '🎬', cls: 'icon-movie', label: '' },
    tv:    { icon: '📺', cls: 'icon-tv', label: '' },
    book:  { icon: '📚', cls: 'icon-book', label: '' },
    music: { icon: '🎵', cls: 'icon-music', label: '' },
  };
  return map[t] || map.movie;
}

// ── 格式化月份 ──
function fmtMonth(m) {
  var names = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  return names[m - 1] || m + '月';
}

// ── 渲染单条记录 ──
function renderItem(item) {
  var ti = typeInfo(item.type);

  // 标题（有豆瓣链接则可点击）
  var titleHtml = item.douban_url
    ? '<a href="' + item.douban_url + '" target="_blank">' + item.title + '</a>'
    : item.title;

  // context 标签
  var ctxTag = item.context ? '<span class="ctx-tag">' + item.context + '</span>' : '';

  // 短评
  var noteHtml = item.note
    ? '<div class="item-note">' + ctxTag + item.note + '</div>'
    : (ctxTag ? '<div class="item-note">' + ctxTag + '</div>' : '');

  // 日期短格式
  var dateShort = item.date ? item.date.slice(5).replace('-', '/') : '';

  return '<div class="media-item" data-type="' + item.type + '" data-video="' + (item.type === 'movie' || item.type === 'tv' ? 'yes' : 'no') + '">'
    + '<span class="item-type-icon ' + ti.cls + '">' + ti.icon + '</span>'
    + '<div class="item-body">'
    +   '<div class="item-title">' + titleHtml + '</div>'
    +   noteHtml
    + '</div>'
    + stars(item.rating)
    + '<span class="item-date">' + dateShort + '</span>'
    + '</div>';
}

// ── 主渲染 ──
function renderAll(filter) {
  var data = typeof MEDIA_LOG !== 'undefined' ? MEDIA_LOG : [];

  // ── 统计：影 = movie + tv，书 = book（仅统计今年=当前年份的数据）──
  var thisYear = new Date().getFullYear().toString();
  var thisYearData = data.filter(function(d) { return d.date && d.date.indexOf(thisYear) === 0; });

  var cMovie = 0, cTv = 0, cBook = 0, cMusic = 0;
  thisYearData.forEach(function(d) {
    if (d.type === 'movie') cMovie++;
    else if (d.type === 'tv') cTv++;
    else if (d.type === 'book') cBook++;
    else if (d.type === 'music') cMusic++;
  });
  var videoTotal = cMovie + cTv;

  document.getElementById('statsBar').innerHTML =
    '<div class="stat-card">'
    +   '<div class="stat-num" style="color:var(--movie);">' + videoTotal + '</div>'
    +   '<div class="stat-label">🎬 影 · 今年</div>'
    +   (typeof DOUBAN_STATS !== 'undefined'
        ? '<div class="stat-sub">豆瓣累计 ' + DOUBAN_STATS.movie + '</div>'
        : '')
    + '</div>'
    + '<div class="stat-card">'
    +   '<div class="stat-num" style="color:var(--book);">' + cBook + '</div>'
    +   '<div class="stat-label">📚 书 · 今年</div>'
    +   (typeof DOUBAN_STATS !== 'undefined'
        ? '<div class="stat-sub">豆瓣累计 ' + DOUBAN_STATS.book + '</div>'
        : '')
    + '</div>';

  // ── 过滤 ──
  var filtered;
  if (filter === 'all') {
    filtered = data;
  } else if (filter === 'video') {
    filtered = data.filter(function(d) { return d.type === 'movie' || d.type === 'tv'; });
  } else if (filter === 'festival') {
    filtered = data.filter(function(d) { return !!d.context; });
  } else {
    filtered = data.filter(function(d) { return d.type === filter; });
  }

  if (filtered.length === 0) {
    document.getElementById('mediaList').innerHTML = '<div class="empty-state">暂无记录</div>';
    return;
  }

  // ── 电影节视图：按届次分组 ──
  if (filter === 'festival') {
    var festGroups = {};
    var festOrder = [];
    filtered.forEach(function(item) {
      var key = item.context || '其他';
      if (!festGroups[key]) { festGroups[key] = []; festOrder.push(key); }
      festGroups[key].push(item);
    });
    // 按届次倒序（利用字符串比较，"第9届"在"第11届"前，手动排序）
    var festSortMap = {};
    festOrder.forEach(function(k) {
      var m = k.match(/第(\d+)届/);
      festSortMap[k] = m ? parseInt(m[1]) : 0;
    });
    festOrder.sort(function(a, b) { return festSortMap[b] - festSortMap[a]; });

    var html = '';
    festOrder.forEach(function(festKey) {
      var items = festGroups[festKey];
      // 月内日期倒序
      items.sort(function(a, b) { return (b.date || '').localeCompare(a.date || ''); });
      html += '<div class="month-group">'
        + '<div class="month-header">'
        +   '<span class="month-name">🎪 ' + festKey + '</span>'
        +   '<span class="month-count">' + items.length + ' 部</span>'
        + '</div>'
        + '<div class="media-list">';
      items.forEach(function(item) { html += renderItem(item); });
      html += '</div></div>';
    });
    document.getElementById('mediaList').innerHTML = html;
    return;
  }

  // ── 按月分组 ──
  var groups = {};
  var groupOrder = [];
  filtered.forEach(function(item) {
    var key = item.date ? item.date.slice(0, 7) : '未知';
    if (!groups[key]) { groups[key] = []; groupOrder.push(key); }
    groups[key].push(item);
  });
  groupOrder.sort(function(a, b) { return b.localeCompare(a); });

  var html = '';
  groupOrder.forEach(function(monthKey) {
    var items = groups[monthKey];
    // 月内日期倒序
    items.sort(function(a, b) { return (b.date || '').localeCompare(a.date || ''); });
    var m = parseInt(monthKey.split('-')[1]);
    var y = monthKey.split('-')[0];
    html += '<div class="month-group">'
      + '<div class="month-header">'
      +   '<span class="month-name">' + y + ' · ' + fmtMonth(m) + '</span>'
      +   '<span class="month-count">' + items.length + ' 条</span>'
      + '</div>'
      + '<div class="media-list">';
    items.forEach(function(item) {
      html += renderItem(item);
    });
    html += '</div></div>';
  });

  document.getElementById('mediaList').innerHTML = html;
}

function filterMedia(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderAll(type);
}

// 初始渲染
renderAll('all');
</script>
</body>
</html>
